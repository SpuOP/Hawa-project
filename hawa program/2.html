<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Website (Centered)</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;  /* Center horizontally */
      align-items: center;      /* Center vertically */
      background-color: #689454; /* Softer background */
    }
    .box {
      text-align: center;
      padding: 30px;
      border: 5px solid #091e42; /* Deep blue border */
      border-radius: 14px;
      background-color: #fff;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }
    .box h1 {
      font-family: 'Poppins', sans-serif;
      color: #2a5298; /* Blue heading */
      margin-bottom: 10px;
    }
    .box p {
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      color: #555;
    }
    .box img {
      max-width: 200px;
      border-radius: 8px;
      margin: 10px;
      transition: transform 0.3s ease;
    }
    .box img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hello, this is my basic website!</h1>
    <p>You can change text, colors, and borders easily.</p>
    <div>
      <img src="download (1).jpg" alt="Image 1">
      <img src="download (2).jpg" alt="Image 2">
    </div>
  </div>
</body>
</html>
