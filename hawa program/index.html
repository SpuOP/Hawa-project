<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 50px;
      background-color: lightblue; /* Background color */
    }
    .box {
      display: inline-block;
      padding: 30px;
      border: 5px solid darkblue; /* Border color */
      border-radius: 12px;
      background-color: white;
    }
    .box h1 {
      color: darkred; /* Text color */
    }
    .box img {
      max-width: 200px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="download (1).jpg" alt="Placeholder Image">
    <h1>Hello, this is my basic website!</h1>
    <p>You can change text, colors, and borders easily.</p>
  </div>
</body>
</html>
